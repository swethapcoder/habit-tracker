<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home - Habit Tracker</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f9f9fb;
      margin: 0;
      padding: 0;
    }

    header {
      background: #7b3fe4;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: 600;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }

    /* Checklist */
    .checklist {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
      margin-bottom: 25px;
    }

    .checklist h2 {
      margin-bottom: 15px;
      color: #7b3fe4;
    }

    .task {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .task input[type="checkbox"] {
      margin-right: 10px;
    }

    /* Calendar */
    .calendar {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
    }

    .calendar h2 {
      margin-bottom: 15px;
      color: #7b3fe4;
    }

    .calendar iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <header>Habit Tracker - Home</header>

  <div class="container">
    <!-- Checklist Section -->
    <div class="checklist">
      <h2>✅ Daily Checklist</h2>
      <div class="task"><input type="checkbox"> Drink 8 glasses of water</div>
      <div class="task"><input type="checkbox"> Exercise for 30 mins</div>
      <div class="task"><input type="checkbox"> Study for 2 hours</div>
      <div class="task"><input type="checkbox"> Sleep 8 hours</div>
    </div>

    <!-- Calendar Section -->
    <div class="calendar">
      <h2>📅 Calendar</h2>
      <!-- Google Calendar embed (example) -->
      <iframe src="https://calendar.google.com/calendar/embed?src=en.indian%23holiday%40group.v.calendar.google.com&ctz=Asia%2FKolkata"></iframe>
    </div>
  </div>
</body>
</html>
